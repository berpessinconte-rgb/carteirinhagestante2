<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestar APS - Carteirinha Digital da Gestante</title>
<style>
:root{--bg:#fff7fb;--card:#ffffff;--ink:#25121b;--muted:#7b6470;--pri:#c02665;--pri2:#ec4899;--ok:#0f766e;--warn:#b45309;--bad:#b91c1c;--line:#f3d5e5;--soft:#fde7f2;--blue:#2563eb}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fff7fb,#fdf2f8);color:var(--ink)}
header{position:sticky;top:0;z-index:10;background:rgba(255,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--pri),var(--pri2));display:grid;place-items:center;color:white;font-weight:900}.brand h1{font-size:18px;margin:0}.brand small{display:block;color:var(--muted);font-size:12px}.wrap{max-width:1220px;margin:0 auto;padding:18px}.grid{display:grid;grid-template-columns:330px 1fr;gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 10px 28px rgba(192,38,101,.08)}h2,h3{margin:0 0 12px}label{display:block;font-size:12px;font-weight:800;color:#5b2b42;margin:10px 0 5px}input,select,textarea{width:100%;border:1px solid #ead0dc;border-radius:12px;padding:10px;font:inherit;background:#fff;color:var(--ink)}textarea{min-height:82px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}button{border:0;border-radius:13px;padding:10px 12px;font-weight:800;cursor:pointer;background:var(--pri);color:white}button.secondary{background:#fce7f3;color:#8a174d}button.ghost{background:#fff;color:var(--pri);border:1px solid var(--line)}button.ok{background:var(--ok)}button.warn{background:var(--warn)}button.bad{background:var(--bad)}.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tab{background:#fff;color:#8a174d;border:1px solid var(--line)}.tab.active{background:var(--pri);color:#fff}.hidden{display:none!important}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;border-radius:999px;background:var(--soft);color:#8a174d;font-weight:800;padding:5px 9px;font-size:12px;margin:2px}.pill.ok{background:#ccfbf1;color:#115e59}.pill.warn{background:#ffedd5;color:#9a3412}.pill.bad{background:#fee2e2;color:#991b1b}.big{font-size:28px;font-weight:900}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.kpi{background:linear-gradient(180deg,#fff,#fff5fa);border:1px solid var(--line);border-radius:18px;padding:12px}.kpi b{display:block;font-size:20px}.searchResult{cursor:pointer}.searchResult:hover{border-color:var(--pri)}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}.printOnly{display:none}.alert{border-left:5px solid var(--bad);padding:10px;border-radius:10px;background:#fff1f2}.info{border-left:5px solid var(--blue);padding:10px;border-radius:10px;background:#eff6ff}.okbox{border-left:5px solid var(--ok);padding:10px;border-radius:10px;background:#ecfdf5}.footer{font-size:12px;color:var(--muted);margin-top:14px}.small{font-size:12px}.quickbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.quickbar button{font-size:12px;padding:9px 7px}.dangerLine{color:var(--bad);font-weight:900}.normalLine{color:var(--ok);font-weight:900}@media(max-width:900px){.grid,.summary,.row,.row3,.quickbar{grid-template-columns:1fr}header{position:static}.wrap{padding:10px}}@media print{header,.sidebar,.tabs,.btns,.noPrint{display:none!important}.grid{display:block}.card{box-shadow:none;border:1px solid #ddd;margin-bottom:10px}.printOnly{display:block}body{background:white}.wrap{max-width:none;padding:0}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header><div class="brand"><div class="logo">G</div><div><h1>Gestar APS</h1><small>Carteirinha digital da gestante - consulta rápida</small></div></div><div><span id="userBadge" class="pill">offline/local</span><button class="ghost" onclick="window.print()">Imprimir/PDF</button> <button class="ghost" onclick="logout()">Sair</button></div></header>
<div class="wrap">
<div id="login" class="card">
<h2>Entrar</h2><p class="muted">Use seu e-mail e senha cadastrados. Para testar no navegador, senha demo: <b>1234</b>.</p>
<div class="row3"><div><label>Perfil</label><select id="loginRole"><option value="medico">Médico/equipe - editar</option><option value="gestante">Gestante - visualizar</option></select></div><div><label>E-mail</label><input id="loginEmail" type="email" placeholder="email@exemplo.com"></div><div><label>Senha</label><input id="loginPass" type="password" placeholder="Senha"></div></div>
<div class="btns"><button onclick="login()">Entrar</button><button class="secondary" onclick="seedDemo()">Criar exemplo local</button><button class="ghost" onclick="document.getElementById('importFile').click()">Importar backup</button><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importBackup(event)"></div>
</div>
<div id="app" class="hidden grid">
<aside class="sidebar card">
<h2>Gestantes</h2>
<label>Pesquisar por CPF ou nome</label><input id="search" placeholder="Digite CPF ou nome" oninput="renderPatients()">
<div class="btns"><button onclick="newPatient()">Nova gestante</button><button class="ghost" onclick="exportBackup()">Backup</button></div>
<div id="patients" class="list" style="margin-top:12px"></div>
</aside>
<main>
<div class="tabs noPrint">
<button class="tab active" onclick="showTab('resumo',this)">Resumo</button><button class="tab" onclick="showTab('consulta',this)">Nova consulta</button><button class="tab" onclick="showTab('historico',this)">Histórico</button><button class="tab" onclick="showTab('exames',this)">Exames</button><button class="tab" onclick="showTab('vacinas',this)">Vacinas</button><button class="tab" onclick="showTab('orientacoes',this)">Orientações</button>
</div>
<section id="empty" class="card"><h2>Selecione ou cadastre uma gestante</h2><p class="muted">Use a busca por CPF/nome ou clique em “Nova gestante”.</p></section>
<section id="panel" class="hidden">
<div id="tab-resumo" class="tabpane card"></div>
<div id="tab-consulta" class="tabpane card hidden"></div>
<div id="tab-historico" class="tabpane card hidden"></div>
<div id="tab-exames" class="tabpane card hidden"></div>
<div id="tab-vacinas" class="tabpane card hidden"></div>
<div id="tab-orientacoes" class="tabpane card hidden"></div>
</section>
</main>
</div>
</div>
<script>
const KEY='gestarAPS_v1';
const SUPABASE_URL='https://nogvgamcmvbuujmrylbt.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_ZffYiyC2_29odpTuznpTuznp1Fw_so1bA-FP'.replace('TuznpTuznp','Tuznp');
let sb=null, online=false, sbUser=null;
try{sb=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){sb=null}
let db=load(); let currentId=null; let role='medico';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{patients:[],config:{}}}catch(e){return{patients:[],config:{}}}}
let saveTimer=null;
function saveSilent(){
  localStorage.setItem(KEY,JSON.stringify(db));
  queueCloudSave();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{renderPatients();},400);
}
function save(){localStorage.setItem(KEY,JSON.stringify(db)); queueCloudSave(); renderAll()}
async function login(){
  role=document.getElementById('loginRole').value;
  const email=(document.getElementById('loginEmail')?.value||'').trim();
  const pass=(document.getElementById('loginPass')?.value||'').trim();

  // Modo demo/local: sempre entra com 1234, mesmo que o campo e-mail esteja preenchido.
  // Isso evita travar o uso em consulta quando o Supabase ainda não estiver configurado.
  if(pass==='1234'){
    online=false;
    sbUser=null;
    openApp();
    return;
  }

  if(!email) return alert('Para entrar no modo demo/local, use a senha 1234. Para login online, preencha e-mail e senha do Supabase.');
  if(!sb) return alert('Não foi possível carregar a conexão online. Use a senha 1234 para modo local.');
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error) return alert('Login online não realizado: '+error.message+'\n\nPara teste local, use a senha 1234.');
  sbUser=data.user; online=true; await loadCloud(); openApp();
}
function openApp(){document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); document.getElementById('userBadge').textContent=online?(role==='medico'?'online médico/equipe':'online gestante'):(role==='medico'?'local médico/equipe':'local gestante'); renderAll()}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function onlyDigits(s){return (s||'').replace(/\D/g,'')}
function parseDate(s){return s?new Date(s+'T12:00:00'):null}
function fmt(d){if(!d)return''; let x=d instanceof Date?d:parseDate(d); return x.toLocaleDateString('pt-BR')}
function iso(d){return d.toISOString().slice(0,10)}
function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}
function today(){return new Date()}
function weeksFromDum(dum){let d=parseDate(dum); if(!d)return null; let diff=Math.floor((today()-d)/86400000); return {w:Math.floor(diff/7),days:diff%7,total:diff}}
function dppFromDum(dum){let d=parseDate(dum);return d?iso(addDays(d,280)):''}
function igText(p){let ig=weeksFromDum(p.dum);return ig?`${ig.w}s${ig.days}d`:''}
function fruit(w){const arr=[[4,'semente de papoula'],[5,'gergelim'],[6,'lentilha'],[7,'mirtilo'],[8,'framboesa'],[9,'uva'],[10,'morango'],[11,'figo'],[12,'limão'],[13,'pêssego'],[14,'maçã'],[15,'laranja'],[16,'abacate'],[17,'pera'],[18,'pimentão'],[19,'manga'],[20,'banana'],[21,'cenoura'],[22,'mamão pequeno'],[23,'berinjela pequena'],[24,'milho'],[25,'couve-flor'],[26,'alface'],[27,'repolho'],[28,'berinjela'],[29,'abóbora pequena'],[30,'melão pequeno'],[31,'coco'],[32,'jaca pequena'],[33,'abacaxi'],[34,'melão'],[35,'abóbora cabotiá'],[36,'alface romana'],[37,'acelga'],[38,'melancia pequena'],[39,'melancia'],[40,'bebê a termo']];let last=arr[0][1];for(const [a,b] of arr){if(w>=a)last=b}return last}
function normal(w){let n=[]; if(w<13)n=['Náuseas, sono, cólicas leves e mamas doloridas podem ocorrer.','Pequeno escape pode ocorrer, mas sangramento vivo, dor forte ou tontura exigem avaliação.','Ainda não é esperado sentir o bebê mexer.']; else if(w<20)n=['Barriga começa a aparecer; pode haver constipação, azia e dor ligamentar.','Movimentos fetais podem ainda não ser percebidos, especialmente na primeira gestação.','Sangramento não deve ser considerado normal sem avaliação.']; else if(w<28)n=['É comum começar a perceber chutes; padrão ainda pode variar.','Pode haver dor lombar, cãibras, azia e contrações de Braxton-Hicks leves.','Redução clara de movimentos, perda de líquido ou sangramento são alertas.']; else n=['Movimentos fetais devem ser percebidos todos os dias.','Falta ou redução importante de movimentos não é normal: orientar avaliação imediata.','Cefaleia forte, escotomas, dor epigástrica, dispneia, PA elevada, sangramento ou perda de líquido são alertas.']; return n}
function examsFor(w){let a=[]; if(w<=13)a=['Hemograma','Tipagem ABO/Rh e Coombs indireto se Rh negativo','Glicemia de jejum','EAS/urina tipo 1 e urocultura','HIV, sífilis/VDRL, hepatite B/HBsAg, hepatite C conforme protocolo','Toxoplasmose IgG/IgM conforme situação epidemiológica/protocolo','USG obstétrica inicial/datação se indicado','Citopatológico se em atraso']; if(w>=11&&w<=14)a.push('USG morfológica 1º trimestre / translucência nucal se disponível'); if(w>=20&&w<=24)a.push('USG morfológica 2º trimestre'); if(w>=24&&w<=28)a.push('TOTG 75 g ou rastreio de diabetes gestacional conforme protocolo','Repetir hemograma e sífilis/HIV conforme rotina local'); if(w>=28&&w<=34)a.push('Hemograma de 3º trimestre','HIV/sífilis/hepatites conforme protocolo','EAS/urocultura se sintomas ou rotina local'); if(w>=35&&w<=37)a.push('Swab vaginal-retal para Streptococcus do grupo B conforme protocolo local'); if(w>=38)a.push('Avaliar vitalidade fetal/USG/encaminhamento conforme risco e protocolo'); return [...new Set(a)]}
function vaccinesFor(w){let a=['Conferir cartão vacinal na primeira consulta']; a.push('Influenza: 1 dose em qualquer idade gestacional, na campanha/sazonalidade'); a.push('COVID-19: conforme calendário vigente e situação vacinal'); a.push('Hepatite B: completar 3 doses se esquema ausente/incompleto'); a.push('dT/dTpa: atualizar tétano/difteria conforme histórico'); if(w>=20)a.push('dTpa: 1 dose em cada gestação, a partir de 20 semanas (preferencialmente 20-36s)'); if(w>=28)a.push('VSR/Abrysvo se disponível no calendário/local: conferir indicação vigente'); return a}
function nextReturn(w){if(w<28)return 'Retorno em até 4 semanas'; if(w<36)return 'Retorno em até 2 semanas'; return 'Retorno semanal até o parto ou antes se alerta'}
function meds(){return ['Ácido fólico: 400 mcg/dia até 12 semanas; alto risco para defeito de tubo neural pode exigir 4-5 mg/dia conforme avaliação.','Sulfato ferroso: profilaxia usual com 40-60 mg de ferro elementar/dia a partir de 20 semanas ou antes se anemia/risco, ajustar por Hb/ferritina/protocolo local.','Náuseas/êmese: medidas dietéticas; metoclopramida 10 mg VO até 8/8h por curto período se necessário, avaliar efeitos extrapiramidais/sonolência e sinais de hiperêmese.','Evitar automedicação; evitar AINEs especialmente no 3º trimestre; revisar fitoterápicos e medicamentos de uso contínuo.']}
function getP(){return db.patients.find(p=>p.id===currentId)}
function newPatient(){if(role!=='medico')return alert('Perfil gestante é apenas visualização.'); let p={id:uid(),nome:'',cpf:'',nasc:'',telefone:'',email:'',dum:'',dpp:'',risco:'Habitual',obs:'',consultas:[],exames:[],vacinas:[]}; db.patients.unshift(p); currentId=p.id; save(); showTab('resumo',document.querySelector('.tab'))}
function seedDemo(){db.patients=[{id:uid(),nome:'Maria Exemplo',cpf:'00000000000',nasc:'1995-01-01',telefone:'',email:'',dum:iso(addDays(today(),-154)),dpp:iso(addDays(addDays(today(),-154),280)),risco:'Habitual',obs:'',consultas:[],exames:[],vacinas:[]}]; currentId=db.patients[0].id; localStorage.setItem(KEY,JSON.stringify(db)); alert('Exemplo criado. Entre com senha 1234.');}
function renderPatients(){let q=(document.getElementById('search')?.value||'').toLowerCase(); let box=document.getElementById('patients'); if(!box)return; box.innerHTML=''; db.patients.filter(p=>(p.nome||'').toLowerCase().includes(q)||onlyDigits(p.cpf).includes(onlyDigits(q))).forEach(p=>{let d=document.createElement('div');d.className='item searchResult';d.onclick=()=>{currentId=p.id;renderAll()};d.innerHTML=`<b>${p.nome||'Sem nome'}</b><br><span class="muted">CPF ${p.cpf||'-'} • IG ${igText(p)||'-'}</span>`;box.appendChild(d)});}
function renderAll(){renderPatients(); let p=getP(); document.getElementById('empty')?.classList.toggle('hidden',!!p); document.getElementById('panel')?.classList.toggle('hidden',!p); if(!p)return; renderResumo(p); renderConsulta(p); renderHistorico(p); renderExames(p); renderVacinas(p); renderOrient(p);}
function disabled(){return role==='gestante'?'disabled':''}
function renderResumo(p){let ig=weeksFromDum(p.dum);let w=ig?ig.w:0;document.getElementById('tab-resumo').innerHTML=`<h2>Carteirinha da Gestante</h2><div class="summary"><div class="kpi"><span class="muted">IG hoje</span><b>${igText(p)||'-'}</b></div><div class="kpi"><span class="muted">DPP</span><b>${fmt(p.dpp)}</b></div><div class="kpi"><span class="muted">Tamanho</span><b>${ig?fruit(w):'-'}</b></div><div class="kpi"><span class="muted">Retorno</span><b>${ig?nextReturn(w):'-'}</b></div></div><div class="row"><div><label>Nome</label><input ${disabled()} value="${p.nome||''}" oninput="getP().nome=this.value;saveSilent()"></div><div><label>CPF</label><input ${disabled()} value="${p.cpf||''}" oninput="getP().cpf=this.value;saveSilent()"></div></div><div class="row3"><div><label>Nascimento</label><input ${disabled()} type="date" value="${p.nasc||''}" oninput="getP().nasc=this.value;saveSilent()"></div><div><label>DUM</label><input ${disabled()} type="date" value="${p.dum||''}" oninput="getP().dum=this.value;getP().dpp=dppFromDum(this.value);saveSilent()"></div><div><label>DPP</label><input ${disabled()} type="date" value="${p.dpp||''}" oninput="getP().dpp=this.value;saveSilent()"></div></div><div class="row"><div><label>Telefone</label><input ${disabled()} value="${p.telefone||''}" oninput="getP().telefone=this.value;saveSilent()"></div><div><label>Risco gestacional</label><select ${disabled()} onchange="getP().risco=this.value;saveSilent()"><option ${p.risco==='Habitual'?'selected':''}>Habitual</option><option ${p.risco==='Intermediário'?'selected':''}>Intermediário</option><option ${p.risco==='Alto risco'?'selected':''}>Alto risco</option></select></div></div><label>Observações permanentes</label><textarea ${disabled()} oninput="getP().obs=this.value;saveSilent()">${p.obs||''}</textarea><h3>Condutas sugeridas para hoje</h3><div class="quickbar"><button onclick="openConsult()">Nova consulta</button><button class="secondary" onclick="showTab('exames',document.querySelectorAll('.tab')[3])">Exames pendentes</button><button class="secondary" onclick="showTab('vacinas',document.querySelectorAll('.tab')[4])">Vacinas</button><button class="secondary" onclick="showTab('orientacoes',document.querySelectorAll('.tab')[5])">Orientações</button><button class="ghost" onclick="window.print()">PDF</button></div><div class="item"><b>Exames por IG:</b><br>${examsFor(w).map(x=>`<span class="pill">${x}</span>`).join('')}</div><div class="item"><b>Vacinas por IG:</b><br>${vaccinesFor(w).map(x=>`<span class="pill ok">${x}</span>`).join('')}</div>`}
function openConsult(){showTab('consulta',document.querySelectorAll('.tab')[1])}
function renderConsulta(p){let ig=weeksFromDum(p.dum);let w=ig?ig.w:0;document.getElementById('tab-consulta').innerHTML=`<h2>Nova consulta rápida</h2><p class="muted">Preencha durante a consulta. Ao salvar, entra no histórico da carteirinha.</p><div class="row3"><div><label>Data</label><input id="cData" type="date" value="${iso(today())}"></div><div><label>IG</label><input id="cIG" value="${igText(p)}"></div><div><label>Retorno em</label><input id="cRet" type="date" value="${ig?iso(addDays(today(),w<28?28:w<36?14:7)):''}"></div></div><div class="row3"><div><label>Peso kg</label><input id="cPeso" type="number" step="0.1"></div><div><label>PA</label><input id="cPA" placeholder="120/80"></div><div><label>Altura uterina cm</label><input id="cAU" type="number" step="0.5"></div></div><div class="row3"><div><label>BCF</label><input id="cBCF" placeholder="140 bpm"></div><div><label>Edema</label><select id="cEdema"><option>Ausente</option><option>Leve</option><option>Moderado/intenso</option></select></div><div><label>Movimentos fetais</label><select id="cMF"><option>Ainda não aplicável</option><option>Presentes</option><option>Reduzidos</option><option>Ausentes</option></select></div></div><label>Queixas</label><textarea id="cQ" placeholder="Náuseas, dor, sangramento, perda de líquido, cefaleia..."></textarea><label>Exame físico / toque / especular quando indicado</label><textarea id="cEF" placeholder="Geral, PA, edema, AU, BCF. Especular se sangramento/perda de líquido/corrimento. Toque se trabalho de parto ou indicação clínica."></textarea><label>Notas da consulta</label><textarea id="cNotas" placeholder="Campo livre para evolução: S/O/A/P, hipóteses, orientação, vínculo, riscos, exames revisados..."></textarea><label>Condutas</label><textarea id="cCond">${examsFor(w).join('; ')}. ${vaccinesFor(w).join('; ')}. ${nextReturn(w)}.</textarea><div class="btns"><button onclick="saveConsult()">Salvar consulta</button><button class="secondary" onclick="fillSOAP()">Modelo SOAP</button><button class="ghost" onclick="copyConsult()">Copiar texto</button></div><div class="info"><b>Lembretes rápidos:</b><br>${meds().map(x=>'• '+x).join('<br>')}</div>`}
function fillSOAP(){document.getElementById('cNotas').value='S: Gestante refere ...\nO: BEG, PA ..., peso ..., AU ..., BCF ..., edema ...\nA: Gestação de risco habitual/intermediário/alto risco, IG ...\nP: Orientada sinais de alerta, exames/vacinas, retorno programado.'}
function consultObj(){return{ id:uid(), data:val('cData'), ig:val('cIG'), retorno:val('cRet'), peso:val('cPeso'), pa:val('cPA'), au:val('cAU'), bcf:val('cBCF'), edema:val('cEdema'), mf:val('cMF'), queixas:val('cQ'), exame:val('cEF'), notas:val('cNotas'), condutas:val('cCond')}}
function val(id){return document.getElementById(id)?.value||''}
function saveConsult(){if(role!=='medico')return alert('Perfil gestante é apenas visualização.'); let p=getP(); p.consultas.unshift(consultObj()); save(); alert('Consulta salva na carteirinha.'); showTab('historico',document.querySelectorAll('.tab')[2])}
function copyConsult(){let c=consultObj(); navigator.clipboard?.writeText(`Consulta ${fmt(c.data)} - IG ${c.ig}\nPA ${c.pa}; Peso ${c.peso}; AU ${c.au}; BCF ${c.bcf}; MF ${c.mf}\nQueixas: ${c.queixas}\nExame: ${c.exame}\nNotas: ${c.notas}\nCondutas: ${c.condutas}\nRetorno: ${fmt(c.retorno)}`); alert('Texto copiado.')}
function renderHistorico(p){document.getElementById('tab-historico').innerHTML=`<h2>Histórico de consultas</h2><div class="list">${(p.consultas||[]).map(c=>`<div class="item"><b>${fmt(c.data)} • IG ${c.ig}</b><br><span class="pill">PA ${c.pa||'-'}</span><span class="pill">Peso ${c.peso||'-'} kg</span><span class="pill">AU ${c.au||'-'} cm</span><span class="pill">BCF ${c.bcf||'-'}</span><p><b>Queixas:</b> ${c.queixas||'-'}</p><p><b>Exame:</b> ${c.exame||'-'}</p><p><b>Notas:</b> ${c.notas||'-'}</p><p><b>Condutas:</b> ${c.condutas||'-'}</p><p><b>Retorno:</b> ${fmt(c.retorno)||'-'}</p></div>`).join('')||'<p class="muted">Sem consultas registradas.</p>'}</div>`}
function renderExames(p){let ig=weeksFromDum(p.dum);let w=ig?ig.w:0;document.getElementById('tab-exames').innerHTML=`<h2>Exames</h2><div class="item"><b>Indicados agora pela IG/consulta:</b><br>${examsFor(w).map(x=>`<span class="pill warn">${x}</span>`).join('')}</div><div class="row3"><input id="eNome" placeholder="Nome do exame"><input id="eData" type="date" value="${iso(today())}"><button onclick="addExam()">Adicionar</button></div><div class="list" style="margin-top:10px">${(p.exames||[]).map((e,i)=>`<div class="item"><b>${e.nome}</b> <span class="pill ${e.status==='feito'?'ok':'warn'}">${e.status}</span><br>Solicitado: ${fmt(e.data)}<label>Resultado</label><textarea ${disabled()} oninput="getP().exames[${i}].resultado=this.value;saveSilent()">${e.resultado||''}</textarea><div class="btns"><button class="secondary" onclick="getP().exames[${i}].status='feito';save()">Marcar feito</button><button class="bad" onclick="getP().exames.splice(${i},1);save()">Excluir</button></div></div>`).join('')||'<p class="muted">Sem exames adicionados.</p>'}</div>`}
function addExam(){if(role!=='medico')return alert('Perfil gestante é apenas visualização.'); let p=getP(); p.exames.unshift({id:uid(),nome:val('eNome'),data:val('eData'),status:'pendente',resultado:''});save()}
function renderVacinas(p){let ig=weeksFromDum(p.dum);let w=ig?ig.w:0;document.getElementById('tab-vacinas').innerHTML=`<h2>Vacinas</h2><div class="item"><b>Indicadas/checar agora:</b><br>${vaccinesFor(w).map(x=>`<span class="pill ok">${x}</span>`).join('')}</div><div class="row3"><input id="vNome" placeholder="Vacina"><input id="vDose" placeholder="Dose/lote"><input id="vData" type="date" value="${iso(today())}"></div><div class="btns"><button onclick="addVac()">Registrar vacina</button></div><div class="list" style="margin-top:10px">${(p.vacinas||[]).map((v,i)=>`<div class="item"><b>${v.nome}</b> <span class="pill ok">${v.dose||''}</span><br>Data: ${fmt(v.data)}<div class="btns"><button class="bad" onclick="getP().vacinas.splice(${i},1);save()">Excluir</button></div></div>`).join('')||'<p class="muted">Sem vacinas registradas.</p>'}</div>`}
function addVac(){if(role!=='medico')return alert('Perfil gestante é apenas visualização.'); let p=getP(); p.vacinas.unshift({id:uid(),nome:val('vNome'),dose:val('vDose'),data:val('vData')});save()}
function renderOrient(p){let ig=weeksFromDum(p.dum);let w=ig?ig.w:0;document.getElementById('tab-orientacoes').innerHTML=`<h2>Orientações da semana</h2><div class="item"><div class="big">${igText(p)||'-'} • bebê como ${ig?fruit(w):'-'}</div><p class="muted">Resumo educativo para a gestante.</p></div><h3>O que pode ser esperado</h3><div class="okbox">${normal(w).map(x=>`<p><span class="normalLine">✓</span> ${x}</p>`).join('')}</div><h3>Sinais de alerta</h3><div class="alert"><p><span class="dangerLine">!</span> Sangramento vivo ou intenso, dor forte, febre, perda de líquido, desmaio, falta de ar, convulsão.</p><p><span class="dangerLine">!</span> Após perceber padrão fetal, redução/ausência de movimentos deve ser avaliada imediatamente.</p><p><span class="dangerLine">!</span> Cefaleia intensa, visão turva/escotomas, dor epigástrica ou PA elevada sugerem risco hipertensivo.</p></div><h3>Medicações básicas</h3><div class="item">${meds().map(x=>`<p>• ${x}</p>`).join('')}</div>`}
function renderBackend(){document.getElementById('tab-backend').innerHTML=`<h2>Backend e publicação</h2><p>Esta versão já funciona localmente. Para acesso médico-paciente em dispositivos diferentes, hospede o HTML e conecte ao Supabase com RLS.</p><div class="info"><b>Durante a consulta:</b> você não precisa abrir o Supabase. Use “Nova gestante”, pesquise CPF e salve consultas no app.</div><h3>Próximo passo técnico</h3><ol><li>Publicar no Vercel/Netlify.</li><li>Criar tabelas no Supabase.</li><li>Ativar RLS e políticas por perfil.</li><li>Trocar o salvamento local pelas chamadas Supabase.</li></ol><p class="muted small">Dados de saúde são sensíveis: para produção, exigir LGPD, consentimento, logs, backups, criptografia e controle de acesso.</p>`}

let cloudTimer=null;
function queueCloudSave(){
  if(!online || !sb) return;
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(saveCurrentToCloud,700);
}
async function loadCloud(){
  if(!sb) return;
  const {data,error}=await sb.from('gestantes').select('*').order('updated_at',{ascending:false});
  if(error){alert('Conectou, mas não conseguiu ler o banco. Verifique se a tabela gestantes e as políticas RLS foram criadas.\n\n'+error.message);return;}
  db.patients=(data||[]).map(r=>({...(r.data||{}), id:(r.data&&r.data.id)||r.id, cloud_id:r.id, cpf:r.cpf||r.data?.cpf||'', nome:r.nome||r.data?.nome||''}));
  localStorage.setItem(KEY,JSON.stringify(db));
  if(db.patients[0]) currentId=db.patients[0].id;
}
async function saveCurrentToCloud(){
  const p=getP();
  if(!online || !sb || !p || !onlyDigits(p.cpf)) return;
  const payload={cpf:onlyDigits(p.cpf),nome:p.nome||'Sem nome',data:p,updated_at:new Date().toISOString()};
  const {data,error}=await sb.from('gestantes').upsert(payload,{onConflict:'cpf'}).select().single();
  if(error){console.warn('Erro ao salvar online',error); document.getElementById('userBadge').textContent='online com erro ao salvar'; return;}
  p.cloud_id=data.id; localStorage.setItem(KEY,JSON.stringify(db)); document.getElementById('userBadge').textContent=role==='medico'?'online médico/equipe':'online gestante';
}
async function logout(){
  if(sb && online) await sb.auth.signOut();
  online=false; sbUser=null; currentId=null;
  document.getElementById('app').classList.add('hidden'); document.getElementById('login').classList.remove('hidden');
}
function showTab(name,btn){document.querySelectorAll('.tabpane').forEach(x=>x.classList.add('hidden'));document.getElementById('tab-'+name)?.classList.remove('hidden');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); if(btn)btn.classList.add('active')}
function saveConfig(){}
function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='backup_gestar_aps.json';a.click()}
function importBackup(ev){let f=ev.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=()=>{db=JSON.parse(r.result);localStorage.setItem(KEY,JSON.stringify(db));renderAll();alert('Backup importado.')}; r.readAsText(f)}

window.addEventListener('DOMContentLoaded',()=>{
  const pass=document.getElementById('loginPass');
  const email=document.getElementById('loginEmail');
  [pass,email].forEach(el=>el&&el.addEventListener('keydown',e=>{if(e.key==='Enter') login();}));
});
